  <body style="margin: 0; padding: 0; min-height: 100vh;">
    <script>
      // Apply dark mode immediately on page load to prevent flash
      (function() {
        const storageKey = 'bamas-theme';
        const stored = localStorage.getItem(storageKey);
        
        // If no stored value, default to dark mode
        if (!stored || (stored !== 'dark' && stored !== 'light' && stored !== 'system')) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
          // Don't set localStorage here - let ThemeProvider handle it
        } else if (stored === 'light') {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        } else if (stored === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else if (stored === 'system') {
          // Check system preference
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          }
        }
      })();
    </script>

    <script>
      // Function to update favicon based on language
      function updateFavicon(language) {
        const logoPath = language === 'bg' 
          ? '/bamas-uploads/BAMAS_Logo_bg.png'
          : '/bamas-uploads/6e77d85a-74ad-47e5-b141-a339ec981d57.png';
        
        document.getElementById('favicon').href = logoPath;
        document.getElementById('apple-touch-icon').href = logoPath;
        document.getElementById('shortcut-icon').href = logoPath;
      }

      // Listen for language changes
      window.addEventListener('languageChange', (event) => {
        updateFavicon(event.detail.language);
      });
    </script>
