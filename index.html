<body style="margin: 0; padding: 0; min-height: 100vh;">
  <script>
    // CRITICAL: Force dark mode immediately on page load to prevent flash
    // This script runs synchronously before any rendering
    (function () {
      const storageKey = 'bamas-theme';
      const root = document.documentElement;

      // Always ensure dark class is present first
      root.classList.add('dark');
      root.classList.remove('light');

      // Check localStorage for user preference
      const stored = localStorage.getItem(storageKey);

      // Only apply light mode if user explicitly set it to 'light'
      // Otherwise, always default to dark (including 'system' preference)
      if (stored === 'light') {
        root.classList.remove('dark');
        root.classList.add('light');
      } else {
        // For 'dark', 'system', or no stored value: always use dark
        root.classList.remove('light');
        root.classList.add('dark');

        // If no stored value or invalid, set it to dark
        if (!stored || (stored !== 'dark' && stored !== 'light' && stored !== 'system')) {
          localStorage.setItem(storageKey, 'dark');
        }
      }
    })();
  </script>
  <div id="root" style="min-height: 100vh;"></div>

  <script>
    // Function to update favicon based on language
    function updateFavicon(language) {
      const logoPath = language === 'bg'
        ? '/bamas-uploads/BAMAS_Logo_bg.png'
        : '/bamas-uploads/6e77d85a-74ad-47e5-b141-a339ec981d57.png';

      document.getElementById('favicon').href = logoPath;
      document.getElementById('apple-touch-icon').href = logoPath;
      document.getElementById('shortcut-icon').href = logoPath;
    }

    // Listen for language changes
    window.addEventListener('languageChange', (event) => {
      updateFavicon(event.detail.language);
    });
  </script>
